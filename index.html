<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darevo | Dare to Evolve</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,Helvetica,sans-serif;
        }

        body{
            background:#2E0238;
            color:#E2D9BD;
        }

        header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 8%;
            background:#2E0238;
            position:fixed;
            width:100%;
            top:0;
        }

        .logo{
            font-size:28px;
            font-weight:bold;
            color:#E2D9BD;
        }

        nav a{
            color:#E2D9BD;
            text-decoration:none;
            margin-left:25px;
            font-weight:600;
        }

        .hero{
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:20px;
        }

        h1{
            font-size:55px;
            margin-bottom:20px;
        }

        #changingText{
            color:#E2D9BD;
            font-size:30px;
            margin-bottom:30px;
            font-weight:bold;
        }

        p{
            max-width:700px;
            line-height:1.8;
            color:#ddd;
        }

        .btn{
            display:inline-block;
            margin-top:40px;
            padding:15px 35px;
            background:#E2D9BD;
            color:#2E0238;
            text-decoration:none;
            border-radius:40px;
            font-weight:bold;
        }

        footer{
            text-align:center;
            padding:30px;
            background:#1c0123;
        }
    </style>
</head>

<body>

<header>

<div class="logo">DAREVO</div>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Portfolio</a>
<a href="#">Academy</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<h1>Dare to Evolve</h1>

<div id="changingText">We Build Brands</div>

<p>
Helping businesses transform ideas into memorable brands through strategy,
creative design, media, and digital communication.
</p>

<a href="#" class="btn">Start Your Project</a>

</section>

<footer>

© 2026 Darevo. All Rights Reserved.

</footer>

<script>

const words=[
"We Build Brands",
"We Create Experiences",
"We Inspire Growth",
"We Solve Communication Challenges"
];

let i=0;

setInterval(function(){

i++;

if(i>=words.length){
i=0;
}

document.getElementById("changingText").innerHTML=words[i];

},2500);

</script>

</body>
</html>
